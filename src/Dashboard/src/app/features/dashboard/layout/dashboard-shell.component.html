<div class="dashboard-shell">
  <mat-toolbar class="dashboard-shell__toolbar" color="primary">
    <a class="dashboard-shell__brand" routerLink="/" aria-label="SiteWatch dashboard home">
      <span class="dashboard-shell__brand-mark">SW</span>
      <span class="dashboard-shell__brand-text">SiteWatch Dashboard</span>
    </a>

    <nav
      class="dashboard-shell__nav"
      aria-label="Dashboard navigation"
    >
      <app-dashboard-dropdown
        triggerLabel="Invoice Management"
        triggerAriaLabel="Invoice management menu"
        menuXPosition="after"
      >
        <a
          dashboardDropdownTracker
          routerLink="/invoices"
          class="dashboard-shell__nav-tracker"
          aria-hidden="true"
          tabindex="-1"
        ></a>
        <a
          dashboardDropdownTracker
          routerLink="/scan-invoice"
          class="dashboard-shell__nav-tracker"
          aria-hidden="true"
          tabindex="-1"
        ></a>
        <a
          dashboardDropdownItem
          mat-menu-item
          routerLink="/invoices"
          routerLinkActive="dashboard-shell__menu-item--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Invoices
        </a>
        <a
          dashboardDropdownItem
          mat-menu-item
          routerLink="/scan-invoice"
          routerLinkActive="dashboard-shell__menu-item--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Scan Invoice
        </a>
      </app-dashboard-dropdown>
    </nav>

    <span class="dashboard-shell__spacer"></span>

    <app-dashboard-dropdown
      triggerLabel="Administration"
      triggerAriaLabel="Administration menu"
      menuXPosition="before"
    >
      <button dashboardDropdownItem mat-menu-item type="button">Manage Users</button>
      <button dashboardDropdownItem mat-menu-item type="button">Add New User</button>
    </app-dashboard-dropdown>

    <button
      mat-icon-button
      class="dashboard-shell__account-button"
      aria-label="Account menu"
      [matMenuTriggerFor]="accountMenu"
    >
      <mat-icon>person</mat-icon>
    </button>
  </mat-toolbar>

  <mat-menu #accountMenu="matMenu">
    <button mat-menu-item type="button" (click)="logOut()">Log Out</button>
  </mat-menu>

  <div class="dashboard-shell__content">
    <router-outlet />
  </div>
</div>
