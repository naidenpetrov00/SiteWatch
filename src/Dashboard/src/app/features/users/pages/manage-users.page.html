<main class="manage-users-page">
  <header class="manage-users-page__header">
    <div>
      <p class="manage-users-page__eyebrow">Administration</p>
      <h1>Manage Users</h1>
      <p class="manage-users-page__summary">
        Review and filter the current dashboard users.
      </p>
    </div>

    <div class="manage-users-page__actions">
      <app-action-button label="Add User" variant="primary"></app-action-button>
    </div>
  </header>

  <app-data-table
    tableEyebrow="Users"
    tableLabel="Manage Users"
    emptyMessage="No users match the current filters."
    filterApplyMode="search"
    [rows]="users()"
    [filteredRowsTotal]="usersFilteredCount()"
    [overallRowsTotal]="usersTotalCount()"
    [columns]="columns"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    (tableStateChange)="onTableStateChange($event)"
  />
</main>
